<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Tạo nhanh 6 số ngẫu nhiên không trùng nhau từ 01 đến 55."
    />
    <meta name="theme-color" content="#f7f4ed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bộ số" />
    <title>Bộ số may mắn</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" href="icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="Bộ số may mắn - Trang chủ">
        <span class="brand-mark" aria-hidden="true">6</span>
        <span>Bộ số may mắn</span>
      </a>
    </header>

    <main>
      <section class="generator" aria-labelledby="page-title">
        <div class="intro">
          <h1 id="page-title">Bộ số<br /><span>may mắn</span></h1>
          <p>Tạo 6 số ngẫu nhiên từ 01 đến 55</p>
        </div>

        <div class="number-panel">
          <div
            class="number-list"
            id="number-list"
            aria-live="polite"
            aria-label="Kết quả"
          >
            <span class="number-ball" data-number>--</span>
            <span class="number-ball" data-number>--</span>
            <span class="number-ball" data-number>--</span>
            <span class="number-ball" data-number>--</span>
            <span class="number-ball" data-number>--</span>
            <span class="number-ball" data-number>--</span>
          </div>

          <button class="generate-button" id="generate-button" type="button">
            <span>Tạo 6 số</span>
            <svg
              aria-hidden="true"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
            >
              <path
                d="M20 7h-3.5A7.5 7.5 0 1 0 19 16.9"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="m17 3 3 4-3 4"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>

          <p class="hint">Mỗi lần bấm là một bộ số mới</p>
        </div>
      </section>
    </main>

    <footer>
      <span>01</span>
      <span class="footer-line" aria-hidden="true"></span>
      <span>55</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
